name: mortar_calculator
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^13.0.1
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  
  # Utils
  math_expressions: ^2.4.0
  collection: ^1.18.0
  archive: ^3.4.9
  share_plus: ^7.2.1
  smooth_page_indicator: ^1.1.0
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/maps/
    - assets/tables/
    - assets/ballistics/
    - assets/maps/everon/
    - assets/maps/arland/
    - assets/maps/kolguev/
    - assets/maps/everon/map.jpg
    - assets/maps/arland/map.jpg
    - assets/maps/kolguev/map.jpg
    - assets/data_pack/maps/everon/
    - assets/data_pack/maps/arland/
    - assets/data_pack/maps/kolguev/
    - assets/data_pack/tables/
